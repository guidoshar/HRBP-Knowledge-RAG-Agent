### ✅ 考题 10：真实供应商 - 风险订单识别

**问题**：
```
查询 RIPON KNITWEAR LTD. 供应商中，HOD日期已过但进度低于50%的高风险订单
```

**标准答案**：
- ✅ 应该返回符合条件的具体订单（需要 WHERE hod_date < CURRENT_DATE AND process_percent < 50）
- ✅ 每个订单应该包含：订单号、进度、HOD日期
- ✅ 应该有业务建议：如"需要优先跟进"等

**陷阱检测**：
- ❌ 如果返回的订单中有 HOD 日期未过的 → **WHERE 条件错误**
- ❌ 如果返回的订单中有进度 ≥ 50% 的 → **WHERE 条件错误**
- ❌ 如果说"未找到风险订单"但实际有 → **SQL 错误**

**验证命令**：
```bash
PGPASSWORD=postgres123 psql -h 121.43.124.134 -p 5432 -U logistics -d logistics -c "
SELECT order_number, process_percent, hod_date 
FROM orders 
WHERE supplier_name = 'RIPON KNITWEAR LTD.' 
  AND hod_date < CURRENT_DATE 
  AND process_percent < 50 
ORDER BY hod_date;
"
```

