## 👥 第二类：基于供应商名称查询所有信息

### ✅ 考题 6：真实供应商 - 订单列表查询

**问题**：
```
查询 RIPON KNITWEAR LTD. 供应商的所有订单，列出订单号、状态、进度、关键日期
```

**标准答案**：
- ✅ 总订单数：**57 条**（这是关键验证点！）
- ✅ 订单号示例：ORD00000013_02, ORD00000020_03, ORD00000024_01, ORD00000082_02 等
- ✅ 进度范围：0% - 100%
- ✅ 应该包含多种状态：In Production, Quality Inspection, Cargo Ready Date 等

**陷阱检测**：
- ❌ 如果总数不是 57 条 → **数据错误或 SQL 错误**
- ❌ 如果订单号是 ORD00000001_02 到 ORD00000020_03 的连续序列 → **在编造数据！**
- ❌ 如果 AI 说"未找到记录" → **SQL 错误或未连接**

**验证命令**：
```bash
PGPASSWORD=postgres123 psql -h 121.43.124.134 -p 5432 -U logistics -d logistics -c "
SELECT COUNT(*) FROM orders WHERE supplier_name = 'RIPON KNITWEAR LTD.';
"
# 应该返回：57

PGPASSWORD=postgres123 psql -h 121.43.124.134 -p 5432 -U logistics -d logistics -c "
SELECT order_number, pending_status, process_percent, hod_date 
FROM orders 
WHERE supplier_name = 'RIPON KNITWEAR LTD.' 
ORDER BY order_number 
LIMIT 10;
"
```

---

### ✅ 考题 7：真实供应商 - 统计分析

**问题**：
```
统计 BANGLADESH APPAREL GROUP 供应商的订单情况：总订单数、平均进度、低进度订单数（<30%）、高进度订单数（>80%）
```

**标准答案**：
- ✅ 总订单数：**130 条**（这是关键验证点！）
- ✅ 平均进度：约 40-60% 左右（具体需计算）
- ✅ 低进度订单数：应该有具体数字（需计算）
- ✅ 高进度订单数：应该有具体数字（需计算）

**陷阱检测**：
- ❌ 如果总数不是 130 条 → **错误**
- ❌ 如果 AI 说"约 XX 条"而不是精确数字 → **在估算，未真正查询**
- ❌ 如果说"未找到记录" → **严重错误**

**验证命令**：
```bash
PGPASSWORD=postgres123 psql -h 121.43.124.134 -p 5432 -U logistics -d logistics -c "
SELECT 
  COUNT(*) AS total_orders,
  ROUND(AVG(process_percent), 2) AS avg_progress,
  COUNT(CASE WHEN process_percent < 30 THEN 1 END) AS low_progress_count,
  COUNT(CASE WHEN process_percent > 80 THEN 1 END) AS high_progress_count
FROM orders 
WHERE supplier_name = 'BANGLADESH APPAREL GROUP';
"
```

