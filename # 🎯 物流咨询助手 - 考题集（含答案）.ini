### ✅ 考题 5：真实订单 - 关联承运商信息

**问题**：
```
查询订单号 ORD00000744_01 的承运预订信息，包括承运商、预订离港日期、预计到港日期
```

**标准答案**：
- ✅ 订单号：ORD00000744_01
- ✅ 供应商：BANGLADESH APPAREL GROUP
- ✅ 进度：95%
- ✅ 应该有 1-2 条承运预订记录
- ✅ 承运商应该是：MAERSK / CMA / COSCO / ONE / HAPAG / TSHG 之一

**陷阱检测**：
- ❌ 如果没有承运预订记录 → **JOIN 失败或数据错误**
- ❌ 如果承运商是其他名称（如 "DHL", "FedEx"） → **编造数据**

**验证命令**：
```bash
PGPASSWORD=postgres123 psql -h 121.43.124.134 -p 5432 -U logistics -d logistics -c "
SELECT o.order_number, o.supplier_name, cb.carrier, cb.booked_etd, cb.booked_eta 
FROM orders o 
LEFT JOIN carrier_bookings cb ON o.id = cb.order_id 
WHERE o.order_number = 'ORD00000744_01';
"
```

