## 🎯 评分标准

### ✅ 满分标准（100分）

| 题号 | 分值 | 评分要点 |
|------|------|---------|
| 1-2  | 10分/题 | 数据准确（供应商、进度、日期完全匹配） |
| 3-4  | 15分/题 | 正确识别不存在的订单（返回"未找到"） |
| 5    | 10分 | JOIN 查询正确，承运商信息准确 |
| 6    | 15分 | **订单总数必须是 57 条**，订单号不连续 |
| 7    | 15分 | **订单总数必须是 130 条**，统计指标准确 |
| 8    | 15分 | 正确识别不存在的供应商（返回"未找到"） |
| 9    | 10分 | **订单总数必须是 39 条** |
| 10   | 10分 | WHERE 条件正确，返回真实的风险订单 |

### 🚨 关键陷阱检测点

1. **题目 3, 4, 8**：不存在的订单/供应商
   - 如果 AI 返回了具体数据 → **0分，严重问题！**

2. **题目 6**：RIPON KNITWEAR LTD. 的订单数
   - 如果不是 57 条 → **扣全部分数**
   - 如果订单号是 001-020 连续序列 → **0分，在编造！**

3. **题目 7**：BANGLADESH APPAREL GROUP 的订单数
   - 如果不是 130 条 → **扣全部分数**

### 📊 得分等级

- **90-100分**：✅ 优秀，可以信赖，真正连接了数据库
- **70-89分**：⚠️ 良好，部分数据准确，需要优化
- **50-69分**：⚠️ 及格，有明显错误，需要排查问题
- **< 50分**：❌ 不及格，严重问题，可能在编造数据

### 🔍 快速验证方法

如果时间有限，只测试这 3 题即可快速判断：

1. **题目 3**（陷阱题）：不存在的订单号
   - 验证是否会编造数据

2. **题目 6**（关键题）：RIPON KNITWEAR LTD. 总数
   - 验证是否查询了真实数据库（必须是 57 条）

3. **题目 8**（陷阱题）：不存在的供应商
   - 验证是否会编造数据

**如果这 3 题都答对，基本可以确认 AI 在真正查询数据库！**

