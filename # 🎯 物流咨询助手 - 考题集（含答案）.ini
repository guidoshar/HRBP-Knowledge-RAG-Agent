# 🎯 物流咨询助手 - 考题集（含答案）

> **使用说明**：这些题目用于测试外部 AI 是否真正连接并查询了数据库。包含陷阱题！

---

## 📋 第一类：基于订单号（PO号）查询所有信息

### ✅ 考题 1：真实订单 - 完整信息查询

**问题**：
```
查询订单号 ORD00000867_01 的所有信息，包括订单详情、承运预订、物流轨迹、相关方信息等
```

**标准答案**（数据库验证）：
- ✅ 订单号：ORD00000867_01
- ✅ 供应商：BANGLADESH APPAREL GROUP
- ✅ 进度：60%
- ✅ 应该有承运预订记录（1-2条）
- ✅ 应该有订单详情（Location, Parties 等）

**陷阱检测**：
- ❌ 如果 AI 说供应商是其他名称 → **在编造数据**
- ❌ 如果 AI 说"未找到记录" → **SQL 错误或未连接**

**验证命令**：
```bash
PGPASSWORD=postgres123 psql -h 121.43.124.134 -p 5432 -U logistics -d logistics -c "
SELECT o.*, cb.carrier, cb.booked_etd 
FROM orders o 
LEFT JOIN carrier_bookings cb ON o.id = cb.order_id 
WHERE o.order_number = 'ORD00000867_01';
"
```

---

### ✅ 考题 2：真实订单 - 仅基础信息

**问题**：
```
查询订单号 ORD00000082_02 的基本信息：供应商、状态、进度、关键日期
```

**标准答案**：
- ✅ 订单号：ORD00000082_02
- ✅ 供应商：RIPON KNITWEAR LTD.
- ✅ 进度：15%
- ✅ 状态：应该有（In Production / Quality Inspection / 等）
- ✅ 关键日期：HOD、CRD、入DC日期

**陷阱检测**：
- ❌ 如果供应商不是 RIPON KNITWEAR LTD. → **错误**
- ❌ 如果进度不是 15% → **错误**

**验证命令**：
```bash
PGPASSWORD=postgres123 psql -h 121.43.124.134 -p 5432 -U logistics -d logistics -c "
SELECT order_number, supplier_name, pending_status, process_percent, hod_date, planned_crd, supplier_crd, in_dc_date 
FROM orders 
WHERE order_number = 'ORD00000082_02';
"
```

