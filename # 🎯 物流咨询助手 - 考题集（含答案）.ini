### 🚨 考题 3：陷阱题 - 不存在的订单号（格式正确）

**问题**：
```
查询订单号 ORD00009999_99 的所有信息
```

**标准答案**：
- ✅ 应该返回："未找到符合条件的订单记录"
- ✅ 或："查询结果为空"
- ✅ 建议检查订单号拼写或确认订单是否已录入系统

**陷阱检测**：
- ❌ 如果 AI 返回了具体的供应商、进度等信息 → **在编造数据！**
- ❌ 如果 AI 说"找到 1 条记录" → **严重错误！**

**验证命令**：
```bash
PGPASSWORD=postgres123 psql -h 121.43.124.134 -p 5432 -U logistics -d logistics -c "
SELECT * FROM orders WHERE order_number = 'ORD00009999_99';
"
# 应该返回：(0 rows)
```

