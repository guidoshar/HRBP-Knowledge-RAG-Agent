## 📝 使用建议

1. **顺序测试**：按题号顺序提问，观察 AI 的表现
2. **记录结果**：每题记录 AI 的回答和得分
3. **重点关注陷阱题**：题目 3, 4, 8 最能暴露问题
4. **验证关键数字**：题目 6 (57条), 题目 7 (130条), 题目 9 (39条)
5. **检查 SQL 语法**：要求 AI 显示生成的 SQL，检查是否有反引号

